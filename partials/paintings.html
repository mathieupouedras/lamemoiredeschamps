<div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
            aria-hidden="true">&times;</span></button>
        <h4 class="modal-title" id="myModalLabel">
          <span ng-if="!current.isPrivate" class="glyphicon glyphicon-ok" aria-hidden="true"></span>
          <span ng-if="current.format" class="glyphicon glyphicon-asterisk" aria-hidden="true"></span>
          {{current.number}} {{current.title}}
        </h4>
      </div>
      <div class="modal-body">
        <div class="row">

          <img class="col-md-8 img-responsive" ng-src="images/{{current.imageFile}}" alt="{{current.title}}">
          <div class="col-md-4">

            <p class="text-justify" ng-bind-html="trustedHtmlText">
              {{current.text}}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div ng-if="loading" class="spinner-overlay">
  <div class="spinner"></div>
</div>

<nav ng-if="!loading" class="index-nav">
  <a ng-repeat="c in centuries" ng-click="scrollTo('painting-' + c.number, $first)" class="index-nav-item">{{c.label}}</a>
</nav>

<div class="hero">
  <h1 class="hero-title">La mémoire des champs</h1>
  <h2 class="hero-subtitle">Lucien Pouëdras</h2>
</div>

<div class="collection-bar">
  <div class="container">
    <a href="#/paintings" class="collection-tab" ng-class="{'active': location == '/paintings'}">Collection</a>
    <a href="#/allpaintings" class="collection-tab" ng-class="{'active': location == '/allpaintings'}">Collection privée</a>
    <span class="collection-count">{{paintings.length}} tableaux <span class="collection-total">· {{totalPaintings}} au total</span></span>
  </div>
</div>

<div class="container">
  <div class="row" ng-repeat="painting in paintings track by $index" ng-if="$index % 4 == 0">
    <div class="col-md-3 col-sm-6"
      ng-repeat="i in [$index, $index + 1, $index + 2, $index + 3]"
      ng-if="paintings[i] != null">
      <div class="thumbnail painting-card" id="painting-{{paintings[i].number}}">
        <a href="#/painting/{{paintings[i].number}}" ng-click="saveScroll()">
          <div class="img-wrapper">
            <img ng-if="paintings[i].imageFile" ng-src="images/thumbnails/{{paintings[i].imageFile}}" alt="{{paintings[i].title}}" loading="lazy">
            <div ng-if="!paintings[i].imageFile" class="thumb-no-image">Non numérisé</div>
            <span ng-if="paintings[i].format" class="grand-format-badge">Grand format</span>
          </div>
        </a>
        <div class="caption">
          <p class="painting-caption"><span>{{paintings[i].number}} —</span> {{paintings[i].title}}</p>
        </div>
      </div>
    </div>
  </div>
</div>
